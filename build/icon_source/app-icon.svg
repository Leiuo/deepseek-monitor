<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="DeepSeek Monitor">
  <defs>
    <!-- 浅色背景渐变 -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%" fx="40%" fy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4fa"/>
    </radialGradient>

    <!-- D 字母 - 深海蓝渐变 -->
    <linearGradient id="dLetter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>

    <!-- D 内侧层次 -->
    <linearGradient id="dInner" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.02"/>
    </linearGradient>

    <!-- 柱状图渐变 -->
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- 外发光 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 柔和发光 -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- D 内部裁剪 -->
    <clipPath id="dClip">
      <path d="
        M 348 284
        L 432 284
        Q 608 284 662 356
        Q 708 428 708 512
        Q 708 596 662 668
        Q 608 740 432 740
        L 348 740
        Z
      "/>
    </clipPath>
  </defs>

  <!-- ===== 背景圆角方块 ===== -->
  <rect width="1024" height="1024" rx="216" fill="url(#bg)"/>

  <!-- 边框 -->
  <rect x="2.5" y="2.5" width="1019" height="1019" rx="213.5" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.08"/>
  <rect x="6" y="6" width="1012" height="1012" rx="210" fill="none" stroke="#d0d7e6" stroke-width="1" opacity="0.4"/>

  <!-- ===== D 字母主体 (粗描边轮廓) ===== -->
  <g filter="url(#glow)">
    <path d="
      M 300 220
      L 440 220
      Q 640 220 706 310
      Q 772 400 772 512
      Q 772 624 706 714
      Q 640 804 440 804
      L 300 804
      Z
    " fill="none" stroke="url(#dLetter)" stroke-width="76" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- D 内侧立体层次 -->
  <path d="
    M 344 260
    L 440 260
    Q 618 260 676 338
    Q 726 416 726 512
    Q 726 608 676 686
    Q 618 764 440 764
    L 344 764
    Z
  " fill="none" stroke="url(#dInner)" stroke-width="8" opacity="0.4"/>

  <!-- ===== D 内部网格背景 ===== -->
  <g clip-path="url(#dClip)" opacity="0.35">
    <g stroke="#94a3b8" stroke-width="1" opacity="0.35">
      <line x1="348" y1="300" x2="708" y2="300"/>
      <line x1="348" y1="400" x2="708" y2="400"/>
      <line x1="348" y1="500" x2="708" y2="500"/>
      <line x1="348" y1="600" x2="708" y2="600"/>
      <line x1="348" y1="700" x2="708" y2="700"/>
    </g>
  </g>

  <!-- ===== 三根上升柱状图 ===== -->
  <g filter="url(#softGlow)">
    <rect x="480" y="510" width="56" height="220" rx="28" fill="url(#bar1)" opacity="0.9"/>
    <rect x="556" y="400" width="56" height="330" rx="28" fill="url(#bar2)" opacity="0.9"/>
    <rect x="632" y="290" width="56" height="440" rx="28" fill="url(#bar3)" opacity="0.9"/>
  </g>

  <!-- 趋势连线 -->
  <polyline points="508,510 584,400 660,290" fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- 数据点 -->
  <circle cx="508" cy="510" r="8" fill="#2dd4bf" stroke="#ffffff" stroke-width="3" opacity="0.95"/>
  <circle cx="584" cy="400" r="8" fill="#60a5fa" stroke="#ffffff" stroke-width="3" opacity="0.95"/>
  <circle cx="660" cy="290" r="8" fill="#a78bfa" stroke="#ffffff" stroke-width="3" opacity="0.95"/>

  <!-- 柱顶高光 -->
  <g opacity="0.3">
    <rect x="488" y="516" width="40" height="6" rx="3" fill="#ffffff"/>
    <rect x="564" y="406" width="40" height="6" rx="3" fill="#ffffff"/>
    <rect x="640" y="296" width="40" height="6" rx="3" fill="#ffffff"/>
  </g>

  <!-- D 顶部高光 -->
  <path d="
    M 330 250
    L 435 250
    Q 595 250 650 316
  " fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- 底部阴影 -->
  <ellipse cx="512" cy="928" rx="380" ry="32" fill="#94a3b8" opacity="0.08"/>
</svg>
