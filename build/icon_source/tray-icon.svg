<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4fa"/>
    </linearGradient>
    <linearGradient id="dStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="6.5" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.3"/>

  <!-- D 字母描边 -->
  <path d="M 8 6 L 14 6 C 21 6, 24 10, 24 16 C 24 22, 21 26, 14 26 L 8 26 Z"
        fill="none" stroke="url(#dStroke)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- 数据柱 (在 D 内部) -->
  <rect x="14" y="17" width="3" height="6" rx="1.5" fill="#2dd4bf" opacity="0.85"/>
  <rect x="18" y="13" width="3" height="10" rx="1.5" fill="#60a5fa" opacity="0.85"/>
  <rect x="22" y="10" width="3" height="13" rx="1.5" fill="#a78bfa" opacity="0.85"/>

  <!-- 趋势线 -->
  <polyline points="15.5,17 19.5,13 23.5,10" fill="none" stroke="#334155" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- 数据点 -->
  <circle cx="15.5" cy="17" r="0.8" fill="#2dd4bf" stroke="#ffffff" stroke-width="0.5" opacity="0.95"/>
  <circle cx="19.5" cy="13" r="0.8" fill="#60a5fa" stroke="#ffffff" stroke-width="0.5" opacity="0.95"/>
  <circle cx="23.5" cy="10" r="0.8" fill="#a78bfa" stroke="#ffffff" stroke-width="0.5" opacity="0.95"/>
</svg>
